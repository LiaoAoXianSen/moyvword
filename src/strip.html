<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' https://dict.youdao.com https://*.youdao.com; media-src 'self' https://dict.youdao.com https://*.youdao.com; object-src 'none'; base-uri 'self'; form-action 'none'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摸鱼单词v62版本</title>
    <link rel="icon" href="../assets/icon.svg" />
    <link rel="stylesheet" href="./strip.css" />
  </head>
  <body>
    <main class="strip" id="dragRegion">
      <div class="compact-row">
        <button class="word-area" id="toggleDetails" type="button" title="展开单词详情">
          <strong id="word">loading</strong>
          <span id="phonetic"></span>
        </button>
        <div class="quick-meaning" id="quickMeaning">Alt+F 看答案</div>
      </div>
      <section class="details" id="details">
        <div class="meta"><span id="mode">复习优先</span><span id="due">下次 现在</span></div>
        <div id="meaning">Alt+F 看答案</div>
        <div id="sentence"></div>
        <nav class="rating-actions" aria-label="单词评分">
          <button data-action="previous" title="Alt+A 上一词">上一词 A</button>
          <button data-action="rate-again" title="Alt+Z 不认识">不会 Z</button>
          <button data-action="rate-hard" title="Alt+X 模糊">模糊 X</button>
          <button data-action="rate-good" title="Alt+C 认识">认识 C</button>
          <button data-action="rate-easy" title="Alt+V 熟知">熟知 V</button>
        </nav>
      </section>
    </main>
    <script src="./strip.js"></script>
  </body>
</html>
